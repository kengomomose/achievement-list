# =============================================================================
# 研究業績リスト データファイル
# =============================================================================
#
# ■ 使い方
#   新しい業績を追加するには、該当セクションの entries: の下に
#   同じ形式でエントリを追加してください。
#   テンプレートが自動的に太字＋下線・句読点・〇マークなどを処理します。
#
# ■ 著者リストのルール
#   - 各著者は { name: "名前" } で記述
#   - 申請者には me: true を追加 → 自動で太字＋下線になります
#   - equal contributionは eq: true を追加 → 名前の後に # の上付き文字が付きます
#
# ■ lang フィールド
#   - "en" → 半角カンマ＋半角スペース区切り
#   - "ja" → 全角読点「、」区切り（スペースなし）
#
# =============================================================================

# ---------------------------------------------------------------------------
# (1) 学術雑誌等に発表した論文、著書
# ---------------------------------------------------------------------------
# 査読あり: 著者, 題名, 掲載誌名, 巻号, ページ, 発行年
# 査読なし: 同上
#
# lang: en の場合
#   → 著者間は ", " で区切り、最後の著者の前に last_sep ("and" or "&") を挿入
#   → 各フィールドは ", " で連結
#
# lang: ja の場合
#   → 著者間は "、" で区切り
#   → 各フィールドは "、" で連結
# ---------------------------------------------------------------------------
papers:
  reviewed:
    # --- 例1: 英語論文（筆頭著者） ---
    - lang: en
      authors:
        - { name: "Firstname Lastname", me: true }
        - { name: "Taro Yamada" }
        - { name: "Hanako Suzuki" }
        - { name: "Jiro Tanaka" }
      last_sep: "and"          # 最後の著者の前: "and" or "&"
      title: "Predicting quality decay in continuously passaged mesenchymal stem cells by detecting morphological anomalies"
      journal: "Journal of Bioscience and Bioengineering"
      volume: "Volume 131, No. 2"
      pages: "198-206"
      year: 2021
      note: ""

    # --- 例2: 英語論文（共著、equal contribution） ---
    - lang: en
      authors:
        - { name: "Takashi Suyama", eq: true }
        - { name: "Firstname Lastname", me: true, eq: true }
        - { name: "Author Three" }
        - { name: "Author Four" }
        - { name: "Last Author" }
      last_sep: "&"
      title: "Morphology-based noninvasive early prediction of serial-passage potency"
      journal: "Inflammation and Regeneration"
      volume: "Volume 42"
      pages: "30"
      year: 2022
      note: "(#:equal contribution)"

  not_reviewed: []
  # --- 査読なし論文がある場合はここに同形式で追加 ---
  # - lang: ja
  #   authors:
  #     - { name: "姓名", me: true }
  #   title: "タイトル"
  #   ...

# ---------------------------------------------------------------------------
# (2) 学術雑誌等又は商業誌における解説、総説
# ---------------------------------------------------------------------------
# 著者、「タイトル」、出版社/誌名、章・節、ページ、年
# lang: ja → 全角読点「、」区切り、タイトルは「」で囲む
# ---------------------------------------------------------------------------
reviews:
  - lang: ja
    authors:
      - { name: "姓名", me: true }
    title: "医薬品モダリティの特許戦略と技術開発動向"
    publication: "株式会社技術情報協会"
    detail: "第4章、16節"
    pages: "p403-411"
    year: 2019

  - lang: ja
    authors:
      - { name: "姓名", me: true }
    title: "実験医学別冊 論文図表を読む"
    publication: "株式会社羊土社"
    detail: "第7章"
    pages: "p240-241"
    year: 2022

# ---------------------------------------------------------------------------
# (3) 国際会議における発表
# ---------------------------------------------------------------------------
# 口頭 / ポスター で区分
#
# 著者, 題名, 学会名, 場所, 月, 年, 査読あり/なし
#   presenter: true → 著者の前に「〇」マーク（太字＋下線の外側に付く）
#   peer_reviewed: true → エントリ末尾に「査読あり」が付く
# ---------------------------------------------------------------------------
international:
  oral:
    - lang: en
      presenter: true
      authors:
        - { name: "Firstname Lastname", me: true }
        - { name: "Taro Yamada" }
        - { name: "Hanako Suzuki" }
        - { name: "Jiro Tanaka" }
      title: "Development of a robust quality prediction model using cell morphological information"
      conference: "JAACT"
      place: "Fuchu"
      month: "November"
      year: 2020
      peer_reviewed: true

  poster: []
  # - lang: en
  #   presenter: true
  #   ...

# ---------------------------------------------------------------------------
# (4) 国内学会・シンポジウム等における発表
# ---------------------------------------------------------------------------
# 口頭 / ポスター / 共著者としての発表 で区分
# (4)のエントリは口頭→ポスター→共著者で通し番号
#
# lang: ja の場合:
#   - 著者間は「、」（スペースなし）
#   - 最後の著者の後、読点なしで直接「タイトル」
#   - presenter: true → 「〇」が名前と一体化して太字＋下線
#
# type: "oral" / "poster" / "coauthor"
# ---------------------------------------------------------------------------
domestic:
  # --- 口頭発表 ---
  oral:
    - lang: ja
      presenter: true
      authors:
        - { name: "姓名", me: true }
        - { name: "共著者一" }
        - { name: "共著者二" }
        - { name: "共著者三" }
      title: "細胞画像情報を用いた幹細胞品質予測モデルの頑健性検証"
      conference: "日本薬学会第65回東海支部総会・大会"
      place: "愛知"
      year: 2019
      month: 7

    - lang: ja
      presenter: true
      authors:
        - { name: "姓名", me: true }
      title: "細胞形態情報を用いた間葉系幹細胞の品質劣化検出法の開発"
      conference: "iACEシンポジウム2021~動物細胞を用いた医薬品および再生医療等製品製造・品質管理の潮流~"
      place: "オンライン"
      year: 2021
      month: 3

  # --- ポスター発表 ---
  poster:
    - lang: ja
      presenter: true
      authors:
        - { name: "姓名", me: true }
        - { name: "共著者一" }
        - { name: "共著者二" }
        - { name: "共著者三" }
        - { name: "共著者四" }
      title: "細胞画像情報を用いた間葉系幹細胞の品質評価モデルの頑健性検証"
      conference: "化学工学会第84年会"
      place: "東京"
      year: 2018
      month: 3

  # --- 共著者としての発表（〇なし、申請者は太字＋下線のみ） ---
  coauthor:
    - lang: ja
      presenter: false
      authors:
        - { name: "共著者一" }
        - { name: "姓名", me: true }
        - { name: "共著者二" }
        - { name: "共著者三" }
      title: "再生医療等製品の品質モニタリングにおける画像データバイアス補正技術の開発"
      conference: "第67回日本薬学会東海支部 総会・大会"
      place: "オンライン"
      year: 2021
      month: 7

# ---------------------------------------------------------------------------
# (5) 特許等
# ---------------------------------------------------------------------------
# 該当なしの場合は patents: [] のまま
# ある場合: { title: "特許名", status: "申請中/公開中/取得", number: "特許番号", year: 2024 }
# ---------------------------------------------------------------------------
patents: []

# ---------------------------------------------------------------------------
# (6) 受賞歴
# ---------------------------------------------------------------------------
# 授与元、賞名「発表タイトル」、年月
