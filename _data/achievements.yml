# =============================================================================
# 研究業績リスト データファイル
# =============================================================================
# Nagoya University / Kengo Momose
# Last updated: 2026-04-02
#
# ■ 使い方
#   新しい業績を追加するには、該当セクションの entries: の下に
#   同じ形式でエントリを追加してください。
#   テンプレートが自動的に太字＋下線・句読点・〇マークなどを処理します。
#
# ■ 著者リストのルール
#   - 各著者は { name: "名前" } で記述
#   - 申請者には me: true を追加 → 自動で太字＋下線になります
#   - equal contributionは eq: true を追加 → 名前の後に # の上付き文字が付きます
#
# ■ lang フィールド
#   - "en" → 半角カンマ＋半角スペース区切り
#   - "ja" → 全角読点「、」区切り（スペースなし）
#
# =============================================================================

# ---------------------------------------------------------------------------
# (1) 学術雑誌等に発表した論文、著書
# ---------------------------------------------------------------------------
# 査読あり: 著者, 題名, 掲載誌名, 巻号, ページ, 発行年
# 査読なし: 同上（著書もここに含む）
#
# lang: en の場合
#   → 著者間は ", " で区切り、最後の著者の前に last_sep ("and" or "&") を挿入
#   → 各フィールドは ", " で連結
#
# lang: ja の場合
#   → 著者間は "、" で区切り
#   → 各フィールドは "、" で連結
#
# --- テンプレート ---
# - lang: en
#   authors:
#     - { name: "Kengo Momose", me: true }
#     - { name: "Author Two" }
#     - { name: "Last Author" }
#   last_sep: "and"          # 最後の著者の前: "and" or "&"
#   title: "論文タイトル"
#   journal: "雑誌名"
#   volume: "Volume X, No. Y"
#   pages: "100-110"
#   year: 2026
#   note: ""                 # 補足（"(#:equal contribution)" など）
# ---------------------------------------------------------------------------
papers:
  reviewed: []
  not_reviewed: []

# ---------------------------------------------------------------------------
# (2) 学術雑誌等又は商業誌における解説、総説
# ---------------------------------------------------------------------------
# 著者、「タイトル」、出版社/誌名、章・節、ページ、年
# lang: ja → 全角読点「、」区切り、タイトルは「」で囲む
#
# --- テンプレート ---
# - lang: ja
#   authors:
#     - { name: "百瀬賢吾", me: true }
#   title: "解説タイトル"
#   publication: "出版社名"
#   detail: "第X章、Y節"
#   pages: "pXXX-XXX"
#   year: 2024
# ---------------------------------------------------------------------------
reviews:
  - lang: ja
    authors:
      - { name: "蟹江慧" }
      - { name: "百瀬賢吾", me: true }
      - { name: "加藤竜司" }
    title: "動物細胞培養の計測と自動化の取り組み、今後の展望"
    publication: "情報技術協会"
    detail: ""
    pages: "p381-391"
    year: 2023

# ---------------------------------------------------------------------------
